<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>J-Quants 接続テスト</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c10; color: #e8eaf0; font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; padding: 32px 16px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 24px; max-width: 640px; margin: 0 auto; }
  h1 { font-size: 18px; color: #f0f6fc; margin-bottom: 6px; }
  .sub { font-size: 12px; color: #8b949e; margin-bottom: 24px; }
  label { font-size: 12px; color: #8b949e; display: block; margin-bottom: 6px; }
  input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; color: #f0f6fc; font-size: 14px; outline: none; margin-bottom: 12px; font-family: monospace; }
  button { width: 100%; background: linear-gradient(135deg,#00e5a0,#00b87a); border: none; border-radius: 9px; padding: 14px; color: #0a0c10; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  button:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
  .result { margin-top: 20px; display: none; }
  .step { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #21262d; }
  .step:last-child { border-bottom: none; }
  .step-label { font-size: 13px; color: #8b949e; min-width: 160px; }
  .step-val { font-size: 13px; color: #c9d1d9; }
  .ok { color: #00e5a0; }
  .err { color: #ff6b6b; }
  .summary { background: #0d1117; border-radius: 10px; padding: 16px; margin-top: 16px; }
  .summary-title { font-size: 13px; font-weight: 700; color: #00e5a0; margin-bottom: 10px; }
  .metric { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #21262d; }
  .metric:last-child { border-bottom: none; }
  .metric-val { color: #4db8ff; font-weight: 700; }
  .error-box { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.3); border-radius: 10px; padding: 16px; margin-top: 16px; color: #ff6b6b; font-size: 13px; }
  .hint { font-size: 11px; color: #8b949e; margin-top: 8px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: 700; margin: 2px; }
  .badge-ok { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.3); color: #00e5a0; }
  .badge-ng { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); color: #ff6b6b; }
</style>
</head>
<body>
<div class="card">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <div style="width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#00e5a0,#4db8ff);display:flex;align-items:center;justify-content:center;font-weight:800;color:#0a0c10;font-size:16px">五</div>
    <div>
      <h1>J-Quants 接続テスト</h1>
      <div class="sub">Sシグナル全銘柄スキャン実装前の動作確認</div>
    </div>
  </div>

  <label>リフレッシュトークン（jpx-jquants.com → APIキーメニュー）</label>
  <input type="password" id="token" placeholder="リフレッシュトークンを貼り付け" />

  <button id="btn" onclick="runTest()">🔬 接続テスト開始</button>

  <div class="result" id="result"></div>
</div>

<script>
async function runTest() {
  const token = document.getElementById('token').value.trim();
  if (!token) { alert('リフレッシュトークンを入力してください'); return; }

  const btn = document.getElementById('btn');
  const resultDiv = document.getElementById('result');
  btn.disabled = true;
  btn.textContent = '🔄 テスト中...';
  resultDiv.style.display = 'none';

  try {
    const res = await fetch('/api/jquants-test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken: token }),
    });
    const data = await res.json();
    renderResult(data);
  } catch(e) {
    renderError('ネットワークエラー: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🔬 接続テスト開始';
  }
}

function renderResult(data) {
  const div = document.getElementById('result');
  div.style.display = 'block';

  if (!data.ok) {
    div.innerHTML = `
      <div class="error-box">
        <div style="font-weight:700;margin-bottom:6px">❌ ${data.step || 'エラー'}</div>
        <div>${data.error}</div>
        ${data.hint ? `<div class="hint">💡 ${data.hint}</div>` : ''}
      </div>`;
    return;
  }

  const s = data.summary;
  const codes = s.testCodesResult || [];

  div.innerHTML = `
    <div style="margin-top:16px">
      <div class="step">
        <div class="step-label">Step 1 IDトークン</div>
        <div class="step-val ok">${data.steps?.step1 || ''}</div>
      </div>
      <div class="step">
        <div class="step-label">Step 2 銘柄一覧</div>
        <div class="step-val ok">${data.steps?.step2 || ''}</div>
      </div>
      <div class="step">
        <div class="step-label">Step 3 日次データ</div>
        <div class="step-val ok">${data.steps?.step3 || ''}</div>
      </div>
      <div class="step">
        <div class="step-label">Step 4 OBV計算</div>
        <div class="step-val ok">${data.steps?.step4 || ''}</div>
      </div>
    </div>

    <div class="summary">
      <div class="summary-title">📊 テスト結果サマリー</div>
      <div class="metric">
        <span>上場銘柄数</span>
        <span class="metric-val">${s.totalListedStocks?.toLocaleString()}銘柄</span>
      </div>
      <div class="metric">
        <span>OBV/RSI計算</span>
        <span class="metric-val">${s.obvFeasible ? '✅ 実装可能' : '⚠️ 要確認'}</span>
      </div>
      <div class="metric">
        <span>テスト銘柄データ</span>
        <span>${codes.map(c => `<span class="badge ${c.ok?'badge-ok':'badge-ng'}">${c.code} ${c.ok ? c.records+'日分' : 'NG'}</span>`).join('')}</span>
      </div>
      ${codes.filter(c=>c.ok&&c.latest).map(c => `
      <div class="metric">
        <span>${c.code} 最新終値</span>
        <span class="metric-val">¥${c.latest.close?.toLocaleString()} (${c.latest.date})</span>
      </div>`).join('')}
    </div>

    <div style="margin-top:16px;background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.3);border-radius:10px;padding:16px;font-size:13px;color:#00e5a0;line-height:1.7">
      ✅ ${data.message}
    </div>`;
}

function renderError(msg) {
  const div = document.getElementById('result');
  div.style.display = 'block';
  div.innerHTML = `<div class="error-box">${msg}</div>`;
}
</script>
</body>
</html>
